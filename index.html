<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chavito</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    
    <main class="conteiner">
        <div class="ui-top">
            <div class="stats">
                <small id="puntuacion">Puntuación: 0</small>
                <small id="contadorTortas">Tortas: 0/10</small>
            </div>
            <button id="btnPause">PAUSAR</button>
        </div>
        <img class="fondo" src="/assets/personaje/fondo.jpeg" alt="">
        <div class="contentPersonaje">
            <img class="personaje" src="/assets/personaje/personaje.gif" alt="">
        </div>
    </main>

    <div class="music-player-container">
        <div class="music-handle">🎵 MÚSICA</div>
        <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1795383091&color=%231d1914&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>
        <div class="music-attribution">
            <a href="https://soundcloud.com/carlos-de-la-luz-935235913" title="Feux" target="_blank">Feux</a> · 
            <a href="https://soundcloud.com/carlos-de-la-luz-935235913/el-chavo-del-8-rkt-slowed" title="El chavo del 8 (RKT) Slowed" target="_blank">El chavo del 8 (RKT) Slowed</a>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
